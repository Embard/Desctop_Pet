name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "desktop_pet/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    name: Build DesktopPet.exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: desktop_pet
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import sprite clips
        working-directory: desktop_pet
        run: |
          if (!(Test-Path assets\master_spritesheet.png)) {
            Write-Error "Missing assets/master_spritesheet.png in repository"
          }
          python sprite_importer.py
          if ($LASTEXITCODE -ne 0) {
            python sprite_builder.py
          }
          if (!(Test-Path assets\animations.json)) {
            Write-Error "Sprite import did not produce assets/animations.json"
          }

      - name: Build executable
        working-directory: desktop_pet
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile --name DesktopPet --add-data "assets;assets" main.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPet-windows
          path: desktop_pet/dist/DesktopPet.exe
          if-no-files-found: error
